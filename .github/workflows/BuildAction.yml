name: BuildAction

on:
  push:
    branches: [ "main", "NewFeatureBranch" ]
  pull_request:
    branches: [ "main", "NewFeatureBranch" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET 9.0 SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ./BlackJackGame/BlackJackGame.csproj

      - name: Build project
        run: dotnet build ./BlackJackGame/BlackJackGame.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ./BlackJackGame.Tests/BlackJackGame.Tests.csproj --configuration Release --no-build --verbosity normal

